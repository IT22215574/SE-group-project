<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Management System</title>
    <script src="lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', 'Segoe UI', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            background-image:
                radial-gradient(at 0% 0%,   rgba(99,102,241,.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139,92,246,.15) 0px, transparent 50%);
        }
        #app { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* ── GLASS CARD ─────────────────────────────────────────────────────── */
        .card {
            background: rgba(30,41,59,.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 1.25rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.25rem;
        }
        .card-title { font-size: 1.05rem; font-weight: 600; display:flex; align-items:center; gap:.5rem; }

        /* ── HEADER ─────────────────────────────────────────────────────────── */
        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2.25rem;
        }
        .header-title {
            font-size: 2.1rem; font-weight: 700;
            background: linear-gradient(to right, #818cf8, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .header-sub { color: #94a3b8; font-size: .875rem; margin-top:.2rem; }

        /* ── FORM ───────────────────────────────────────────────────────────── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 120px auto auto;
            gap: .875rem;
            align-items: end;
        }
        @media(max-width:768px) { .form-grid { grid-template-columns: 1fr 1fr; } }
        label { display:block; font-size:.8rem; font-weight:500; color:#cbd5e1; margin-bottom:.4rem; }
        input[type="text"], input[type="number"], input[type="email"],
        input[type="password"], select {
            width:100%; padding:.7rem 1rem;
            background: rgba(15,23,42,.7);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: .5rem;
            color: #f8fafc; font-size:.95rem; font-family:inherit;
            outline:none; transition: border-color .2s;
        }
        input:focus, select:focus { border-color:#6366f1; }
        select option { background:#1e293b; }

        /* ── BUTTONS ────────────────────────────────────────────────────────── */
        .btn {
            display:inline-flex; align-items:center; gap:.4rem;
            padding:.65rem 1.1rem; border:none; border-radius:.5rem;
            font-family:inherit; font-size:.875rem; font-weight:600;
            cursor:pointer; transition: all .18s; white-space:nowrap;
        }
        .btn:disabled { opacity:.45; cursor:not-allowed; }
        .btn svg { width:1rem; height:1rem; flex-shrink:0; }

        .btn-primary   { background:#4f46e5; color:#fff; }
        .btn-primary:hover:not(:disabled)   { background:#4338ca; transform:translateY(-1px); }

        .btn-success   { background:rgba(34,197,94,.15); color:#4ade80; border:1px solid rgba(34,197,94,.25); }
        .btn-success:hover:not(:disabled)   { background:rgba(34,197,94,.25); }

        .btn-warning   { background:rgba(245,158,11,.15); color:#fbbf24; border:1px solid rgba(245,158,11,.25); }
        .btn-warning:hover:not(:disabled)   { background:rgba(245,158,11,.25); }

        .btn-danger    { background:rgba(239,68,68,.15); color:#f87171; border:1px solid rgba(239,68,68,.25); }
        .btn-danger:hover:not(:disabled)    { background:rgba(239,68,68,.25); }

        .btn-ghost     { background:transparent; color:#94a3b8; border:1px solid rgba(255,255,255,.1); }
        .btn-ghost:hover:not(:disabled)     { background:rgba(255,255,255,.07); color:#f8fafc; }

        .btn-icon { padding:.45rem; border-radius:.4rem; }

        /* ── TABLE ──────────────────────────────────────────────────────────── */
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; font-size:.9rem; }
        thead th {
            padding:.875rem 1rem; text-align:left;
            font-size:.68rem; text-transform:uppercase; letter-spacing:.07em;
            color:#64748b; font-weight:600;
            border-bottom:1px solid rgba(255,255,255,.08);
        }
        tbody tr { border-bottom:1px solid rgba(255,255,255,.05); transition:background .15s; }
        tbody tr:hover { background:rgba(255,255,255,.03); }
        tbody tr:last-child { border-bottom:none; }
        td { padding:.875rem 1rem; vertical-align:middle; }
        td.actions { text-align:right; }
        .actions-group { display:inline-flex; gap:.4rem; }

        /* ── BADGES ─────────────────────────────────────────────────────────── */
        .badge {
            display:inline-block; padding:.2rem .7rem; border-radius:9999px;
            font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em;
        }
        .badge-green  { background:rgba(34,197,94,.12);  color:#4ade80; border:1px solid rgba(34,197,94,.2); }
        .badge-amber  { background:rgba(245,158,11,.12); color:#fbbf24; border:1px solid rgba(245,158,11,.2); }
        .badge-indigo { background:rgba(99,102,241,.15); color:#818cf8; border:1px solid rgba(99,102,241,.25); }
        .badge-red    { background:rgba(239,68,68,.12);  color:#f87171; border:1px solid rgba(239,68,68,.2); }

        /* ── ALERT BAR ──────────────────────────────────────────────────────── */
        .alert {
            display:none; align-items:center; gap:.6rem;
            padding:.875rem 1.1rem; border-radius:.75rem;
            font-size:.875rem; margin-bottom:1.25rem;
        }
        .alert.show { display:flex; }
        .alert.success { background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.25); color:#4ade80; }
        .alert.error   { background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.25); color:#f87171; }
        .alert svg { width:1.1rem; height:1.1rem; flex-shrink:0; }

        /* ── GRADE BADGE ────────────────────────────────────────────────────── */
        .grade { font-family:'Courier New',monospace; font-weight:700; font-size:1rem; color:#818cf8; }

        /* ── MARKS PREVIEW ──────────────────────────────────────────────────── */
        #grade-preview {
            padding:.7rem 1rem; background:rgba(15,23,42,.7);
            border:1px solid rgba(255,255,255,.1); border-radius:.5rem;
            color:#818cf8; font-family:'Courier New',monospace; font-weight:700;
            font-size:1rem; display:flex; align-items:center; justify-content:center;
        }

        /* ── LOGIN ──────────────────────────────────────────────────────────── */
        .login-wrap {
            display:flex; align-items:center; justify-content:center; min-height:80vh;
        }
        .login-card {
            width:100%; max-width:420px; padding:2.5rem;
            background:rgba(30,41,59,.85); border:1px solid rgba(255,255,255,.1);
            border-radius:1.5rem; animation:fadeUp .4s ease both;
        }
        .login-icon {
            display:inline-flex; padding:.75rem;
            background:rgba(99,102,241,.2); border-radius:1rem;
            color:#818cf8; margin-bottom:1rem;
        }
        .login-card h1 { font-size:1.875rem; font-weight:700; text-align:center; }
        .login-card .sub { text-align:center; color:#64748b; margin:.25rem 0 2rem; font-size:.9rem; }
        .mb { margin-bottom:1.25rem; }
        .btn-full { width:100%; padding:.875rem; justify-content:center; }

        /* ── STUDENT RESULTS GRID ───────────────────────────────────────────── */
        .results-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:1.1rem; }
        .result-card {
            background:rgba(30,41,59,.75); border:1px solid rgba(255,255,255,.1);
            border-radius:1.1rem; padding:1.4rem;
            transition:border-color .2s, transform .2s;
        }
        .result-card:hover { border-color:rgba(99,102,241,.5); transform:translateY(-2px); }
        .result-card h3 { font-size:1.05rem; font-weight:700; margin-bottom:.25rem; }
        .result-marks { font-size:2.25rem; font-family:'Courier New',monospace; font-weight:700; color:#818cf8; margin:.5rem 0 1rem; }
        .result-meta { display:flex; justify-content:space-between; font-size:.75rem; color:#64748b; border-top:1px solid rgba(255,255,255,.06); padding-top:.875rem; }
        .highlight { color:#f8fafc; font-weight:700; }
        .empty-state {
            grid-column:1/-1; padding:3rem; text-align:center;
            color:#475569; font-style:italic;
            background:rgba(30,41,59,.4); border:1px solid rgba(255,255,255,.06);
            border-radius:1.1rem;
        }

        /* ── NOTIFICATION BELL ──────────────────────────────────────────────── */
        .notif-wrap { position:relative; }
        .notif-btn {
            display:flex; padding:.5rem; background:transparent; border:none;
            color:#f8fafc; cursor:pointer; border-radius:9999px; position:relative;
            transition:background .18s;
        }
        .notif-btn:hover { background:rgba(255,255,255,.1); }
        .notif-badge {
            display:none; position:absolute; top:1px; right:1px;
            min-width:16px; height:16px; padding:0 4px;
            background:#ef4444; border-radius:9999px;
            border:2px solid #0f172a;
            font-size:.58rem; font-weight:700; color:#fff;
            display:none; align-items:center; justify-content:center;
        }
        .notif-badge.show { display:flex; }
        .notif-dropdown {
            display:none; position:absolute; right:0; top:calc(100% + .6rem);
            width:340px;
            background:rgba(15,23,42,.97); border:1px solid rgba(255,255,255,.1);
            border-radius:1.1rem; box-shadow:0 25px 50px rgba(0,0,0,.6);
            z-index:100; overflow:hidden;
        }
        .notif-dropdown.show { display:block; }
        .notif-top {
            display:flex; justify-content:space-between; align-items:center;
            padding:.875rem 1.1rem; border-bottom:1px solid rgba(255,255,255,.08);
        }
        .notif-top-title { font-weight:700; font-size:.875rem; }
        .notif-list { max-height:22rem; overflow-y:auto; }
        .notif-item {
            padding:1rem 1.1rem; border-bottom:1px solid rgba(255,255,255,.05);
            transition:background .15s;
        }
        .notif-item:last-child { border-bottom:none; }
        .notif-item.unread { background:rgba(99,102,241,.06); border-left:3px solid #6366f1; }
        .notif-item.read   { border-left:3px solid transparent; opacity:.75; }
        .notif-body { display:flex; justify-content:space-between; align-items:flex-start; gap:.5rem; }
        .notif-content { flex:1; }
        .notif-msg { font-size:.85rem; font-weight:500; line-height:1.45; }
        .notif-time { font-size:.7rem; color:#475569; margin-top:.3rem; }
        .notif-status { font-size:.67rem; font-weight:700; text-transform:uppercase; margin-top:.3rem; letter-spacing:.04em; }
        .notif-item.unread .notif-status { color:#818cf8; }
        .notif-item.read   .notif-status { color:#475569; }
        .notif-acts { display:flex; flex-direction:column; gap:.3rem; flex-shrink:0; }
        .btn-notif {
            padding:.3rem .4rem; background:transparent; border:none;
            cursor:pointer; border-radius:.35rem; transition:background .15s;
            display:flex; align-items:center; justify-content:center;
        }
        .btn-notif svg { width:.9rem; height:.9rem; }
        .btn-notif.toggle { color:#818cf8; }
        .btn-notif.toggle:hover { background:rgba(99,102,241,.15); }
        .btn-notif.del { color:#f87171; }
        .btn-notif.del:hover { background:rgba(239,68,68,.15); }
        .notif-empty { padding:2rem; text-align:center; color:#475569; font-size:.875rem; }

        /* ── SECTION TITLE ───────────────────────────────────────────────────── */
        .section-title {
            font-size:1.25rem; font-weight:700; margin-bottom:1.25rem;
            display:flex; align-items:center; gap:.5rem; color:#e2e8f0;
        }
        .section-title svg { color:#818cf8; width:1.25rem; height:1.25rem; }

        /* ── RIGHT-SIDE HEADER ACTIONS ───────────────────────────────────────── */
        .hdr-actions { display:flex; align-items:center; gap:.75rem; }

        /* ── ICON BADGE (student header) ─────────────────────────────────────── */
        .icon-wrap { padding:.75rem; background:#4f46e5; border-radius:1rem; color:#fff; display:flex; }

        /* ── ANIMATIONS ──────────────────────────────────────────────────────── */
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(12px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .fade-in { animation:fadeUp .35s ease both; }

        /* ── UTILITY ─────────────────────────────────────────────────────────── */
        .text-muted { color:#64748b; }
        .font-mono  { font-family:'Courier New',monospace; }
        .fw7        { font-weight:700; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════════════════
const API = 'http://localhost:8080/api';

// Clear old MongoDB string IDs
let _s = JSON.parse(localStorage.getItem('user')) || null;
if (_s && isNaN(_s.id)) { localStorage.removeItem('user'); _s = null; }
let currentUser = _s;

let studentCache = {};   // { id: { id, name, email, classID } }
let editingId    = null; // result ID being edited, or null

// ════════════════════════════════════════════════════════════════════════════
//  ROUTER
// ════════════════════════════════════════════════════════════════════════════
function render() {
    const app = document.getElementById('app');
    if (!currentUser)                      { app.innerHTML = loginPage(); }
    else if (currentUser.role==='teacher') { app.innerHTML = teacherPage(); initTeacher(); }
    else                                   { app.innerHTML = studentPage(); initStudent(); }
    icons();
}

function icons() { if (typeof lucide!=='undefined') lucide.createIcons(); }

// ════════════════════════════════════════════════════════════════════════════
//  LOGIN
// ════════════════════════════════════════════════════════════════════════════
function loginPage() {
    return `
    <div class="login-wrap">
      <div class="login-card">
        <div style="text-align:center; margin-bottom:1.5rem;">
          <div class="login-icon" style="justify-content:center; display:inline-flex;">
            <i data-lucide="log-in" style="width:2rem;height:2rem;"></i>
          </div>
          <h1>Welcome Back</h1>
          <p class="sub">Sign in to continue</p>
        </div>
        <div id="login-alert" class="alert error"></div>
        <form onsubmit="doLogin(event)">
          <div class="mb"><label>Email</label>
            <input id="l-email" type="email" value="teacher@school.com"></div>
          <div class="mb"><label>Password</label>
            <input id="l-pass" type="password" value="password123"></div>
          <button id="l-btn" type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
        <div style="margin-top:1.25rem; text-align:center; font-size:.8rem; color:#475569;">
          <strong style="color:#94a3b8;">Teacher:</strong> teacher@school.com &nbsp;|&nbsp;
          <strong style="color:#94a3b8;">Students:</strong> alice@school.com &nbsp;/&nbsp; bob@school.com &nbsp;(pass: password123)
        </div>
      </div>
    </div>`;
}

async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('l-btn');
    btn.disabled = true; btn.textContent = 'Signing in…';
    showAlert('login-alert', '', false);
    try {
        const r = await fetch(`${API}/auth/login`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ email: document.getElementById('l-email').value,
                                   password: document.getElementById('l-pass').value })
        });
        const d = await r.json();
        if (d.error) { showAlert('login-alert', d.error, true); btn.disabled=false; btn.textContent='Sign In'; }
        else { currentUser = d; localStorage.setItem('user', JSON.stringify(d)); render(); }
    } catch(err) {
        showAlert('login-alert', 'Cannot reach server. Is the backend running?', true);
        btn.disabled=false; btn.textContent='Sign In';
    }
}

function doLogout() { currentUser=null; localStorage.removeItem('user'); render(); }

// ════════════════════════════════════════════════════════════════════════════
//  TEACHER PAGE
// ════════════════════════════════════════════════════════════════════════════
function teacherPage() {
    return `
    <div class="fade-in">
      <header>
        <div>
          <div class="header-title">Teacher Portal</div>
          <div class="header-sub">Welcome, Prof. ${currentUser.name}&nbsp;&nbsp;·&nbsp;&nbsp;Class 10-A | Mathematics</div>
        </div>
        <button class="btn btn-danger" onclick="doLogout()">
          <i data-lucide="log-out"></i> Logout
        </button>
      </header>

      <!-- ALERT -->
      <div id="t-alert" class="alert"></div>

      <!-- CREATE / EDIT FORM ──────────────────────────────────── -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <i data-lucide="plus-circle" style="width:1.1rem;height:1.1rem;color:#818cf8;"></i>
            <span id="form-title">Add New Result</span>
          </div>
          <button id="cancel-btn" class="btn btn-ghost" onclick="cancelEdit()" style="display:none;">
            <i data-lucide="x"></i> Cancel Edit
          </button>
        </div>
        <form onsubmit="submitResult(event)">
          <div class="form-grid">
            <div>
              <label>Student</label>
              <select id="f-student"><option value="">Loading…</option></select>
            </div>
            <div>
              <label>Subject</label>
              <input id="f-subject" type="text" value="Mathematics" placeholder="e.g. Mathematics">
            </div>
            <div>
              <label>Marks (0–100)</label>
              <input id="f-marks" type="number" min="0" max="100" placeholder="85"
                     oninput="updateGradePreview(this.value)">
            </div>
            <div>
              <label>Grade</label>
              <div id="grade-preview">–</div>
            </div>
            <div style="display:flex; align-items:flex-end;">
              <button id="f-submit" type="submit" class="btn btn-primary" style="width:100%;">
                <i data-lucide="plus"></i> <span id="f-submit-label">Add Result</span>
              </button>
            </div>
          </div>
        </form>
      </div>

      <!-- RESULTS TABLE ────────────────────────────────────────── -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <i data-lucide="table-2" style="width:1.1rem;height:1.1rem;color:#818cf8;"></i>
            Class Results
          </div>
          <button id="publish-btn" class="btn btn-primary" onclick="publishResults()">
            <i data-lucide="send"></i> Publish &amp; Notify Students
          </button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Student</th>
                <th>Subject</th>
                <th>Marks</th>
                <th>Grade</th>
                <th>Status</th>
                <th style="text-align:right;">Actions (Edit / Delete)</th>
              </tr>
            </thead>
            <tbody id="results-body">
              <tr><td colspan="6" class="text-muted" style="padding:2rem;text-align:center;">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}

async function initTeacher() {
    await loadStudents();
    await loadResults();
}

async function loadStudents() {
    try {
        const r = await fetch(`${API}/users/students/10-A`);
        const data = await r.json();
        studentCache = {};
        data.forEach(s => { studentCache[s.id] = s; });
        const sel = document.getElementById('f-student');
        if (!sel) return;
        sel.innerHTML = data.map(s =>
            `<option value="${s.id}">${s.name} (${s.email})</option>`
        ).join('') || '<option value="">No students found</option>';
    } catch(err) { console.error('loadStudents:', err); }
}

async function loadResults() {
    try {
        const r = await fetch(`${API}/results/class/10-A`);
        const data = await r.json();
        const body = document.getElementById('results-body');
        if (!body) return;

        if (!data.length) {
            body.innerHTML = `<tr><td colspan="6" class="text-muted" style="padding:2rem;text-align:center;">
                No results yet. Add one above.</td></tr>`;
            return;
        }

        body.innerHTML = data.map(r => {
            const stu = studentCache[r.studentID];
            const stuName = stu ? stu.name : `Student #${r.studentID}`;
            return `
            <tr id="row-${r.id}">
                <td class="fw7">${stuName}</td>
                <td class="text-muted">${r.subject}</td>
                <td class="font-mono fw7" style="color:#818cf8;">${r.marks}</td>
                <td><span class="grade">${r.grade}</span></td>
                <td>${r.visible
                    ? '<span class="badge badge-green">Published</span>'
                    : '<span class="badge badge-amber">Pending</span>'}</td>
                <td class="actions">
                  <div class="actions-group" id="act-${r.id}" style="justify-content:flex-end;">
                    <button class="btn btn-warning btn-icon"
                            onclick="startEdit(${r.id},${r.studentID},'${r.subject}',${r.marks})"
                            title="Edit result">
                      <i data-lucide="pencil"></i>
                    </button>
                    <button class="btn btn-danger btn-icon"
                            onclick="askDelete(${r.id})"
                            title="Delete result">
                      <i data-lucide="trash-2"></i>
                    </button>
                  </div>
                  <div id="confirm-${r.id}" style="display:none; align-items:center; gap:.4rem; justify-content:flex-end;">
                    <span style="font-size:.8rem; color:#f87171; font-weight:600; white-space:nowrap;">Delete?</span>
                    <button class="btn btn-danger" style="padding:.3rem .75rem; font-size:.8rem;"
                            onclick="confirmDelete(${r.id})">Yes</button>
                    <button class="btn btn-ghost" style="padding:.3rem .75rem; font-size:.8rem;"
                            onclick="cancelDelete(${r.id})">No</button>
                  </div>
                </td>
            </tr>`;
        }).join('');
        icons();

        // Disable publish if all already published
        if (data.every(r => r.visible)) {
            const pb = document.getElementById('publish-btn');
            if (pb) { pb.disabled=true; pb.innerHTML='<i data-lucide="check"></i> All Published'; icons(); }
        }
    } catch(err) { console.error('loadResults:', err); }
}

// Grade preview as user types
function updateGradePreview(v) {
    const m = parseInt(v, 10);
    const el = document.getElementById('grade-preview');
    if (!el) return;
    if (isNaN(m) || m<0 || m>100) { el.textContent='–'; return; }
    el.textContent = calcGrade(m);
}
function calcGrade(m) {
    if (m>=90) return 'A+';
    if (m>=80) return 'A';
    if (m>=70) return 'B';
    if (m>=60) return 'C';
    if (m>=50) return 'D';
    return 'F';
}

// ── CREATE / UPDATE (shared form) ────────────────────────────
async function submitResult(e) {
    e.preventDefault();
    const studentID = document.getElementById('f-student').value;
    const subject   = document.getElementById('f-subject').value.trim();
    const marks     = parseInt(document.getElementById('f-marks').value, 10);
    if (!studentID) { showAlert('t-alert','Please select a student.',true); return; }
    if (!subject)   { showAlert('t-alert','Please enter a subject.',true); return; }
    if (isNaN(marks)||marks<0||marks>100) { showAlert('t-alert','Marks must be 0–100.',true); return; }

    const btn = document.getElementById('f-submit');
    btn.disabled=true;

    const payload = { studentID: parseInt(studentID), classID: '10-A', subject, marks };
    const url    = editingId ? `${API}/results/${editingId}` : `${API}/results`;
    const method = editingId ? 'PUT' : 'POST';

    try {
        const r = await fetch(url, {
            method, headers:{'Content-Type':'application/json'},
            body: JSON.stringify(payload)
        });
        if (!r.ok) throw new Error('Server error');
        showAlert('t-alert', editingId ? 'Result updated successfully!' : 'Result added successfully!', false);
        cancelEdit();
        await loadResults();
    } catch(err) {
        showAlert('t-alert','Operation failed. Please try again.',true);
    } finally { btn.disabled=false; }
}

function startEdit(id, studentID, subject, marks) {
    editingId = id;
    document.getElementById('form-title').textContent  = 'Edit Result';
    document.getElementById('f-submit-label').textContent = 'Save Changes';
    document.getElementById('cancel-btn').style.display = '';
    document.getElementById('f-student').value = studentID;
    document.getElementById('f-subject').value = subject;
    document.getElementById('f-marks').value   = marks;
    updateGradePreview(marks);
    window.scrollTo({ top:0, behavior:'smooth' });
    icons();
}

function cancelEdit() {
    editingId = null;
    document.getElementById('form-title').textContent    = 'Add New Result';
    document.getElementById('f-submit-label').textContent= 'Add Result';
    document.getElementById('cancel-btn').style.display  = 'none';
    document.getElementById('f-student').value  = '';
    document.getElementById('f-subject').value  = 'Mathematics';
    document.getElementById('f-marks').value    = '';
    document.getElementById('grade-preview').textContent = '–';
}

// ── DELETE result (inline confirm — no browser dialog) ───────────
function askDelete(id) {
    document.getElementById('act-' + id).style.display     = 'none';
    document.getElementById('confirm-' + id).style.display = 'flex';
}
function cancelDelete(id) {
    document.getElementById('act-' + id).style.display     = 'flex';
    document.getElementById('confirm-' + id).style.display = 'none';
}
async function confirmDelete(id) {
    try {
        const r = await fetch(`${API}/results/${id}`, { method:'DELETE' });
        if (!r.ok) throw new Error();
        if (editingId===id) cancelEdit();
        showAlert('t-alert','Result deleted successfully.',false);
        await loadResults();
    } catch(err) { showAlert('t-alert','Delete failed. Please try again.',true); }
}

// ── PUBLISH ───────────────────────────────────────────────────
async function publishResults() {
    const btn = document.getElementById('publish-btn');
    btn.disabled=true; btn.innerHTML='<i data-lucide="loader"></i> Publishing…'; icons();
    try {
        const r = await fetch(`${API}/results/publish`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ classID:'10-A', subject:'Mathematics' })
        });
        const d = await r.json();
        showAlert('t-alert', d.message || 'Published!', false);
        await loadResults();
    } catch(err) {
        showAlert('t-alert','Publish failed.',true);
        btn.disabled=false; btn.innerHTML='<i data-lucide="send"></i> Publish & Notify Students';
    }
    icons();
}

// ════════════════════════════════════════════════════════════════════════════
//  STUDENT PAGE
// ════════════════════════════════════════════════════════════════════════════
function studentPage() {
    return `
    <div class="fade-in">
      <header>
        <div style="display:flex;align-items:center;gap:1rem;">
          <div class="icon-wrap">
            <i data-lucide="graduation-cap" style="width:1.875rem;height:1.875rem;"></i>
          </div>
          <div>
            <div style="font-size:1.75rem;font-weight:700;">Student Portal</div>
            <div class="header-sub">Welcome, ${currentUser.name} &nbsp;·&nbsp; Class ${currentUser.classID||'–'}</div>
          </div>
        </div>
        <div class="hdr-actions">
          <!-- Notification Bell -->
          <div class="notif-wrap">
            <button class="notif-btn" onclick="toggleDropdown(event)">
              <i data-lucide="bell" style="width:1.375rem;height:1.375rem;"></i>
              <span id="notif-badge" class="notif-badge"></span>
            </button>
            <div id="notif-dropdown" class="notif-dropdown">
              <div class="notif-top">
                <span class="notif-top-title">Notifications</span>
                <button class="btn btn-danger" style="padding:.35rem .7rem;font-size:.75rem;"
                        onclick="clearAllNotifications()">
                  <i data-lucide="trash" style="width:.8rem;height:.8rem;"></i> Clear All
                </button>
              </div>
              <div id="notif-list" class="notif-list">
                <div class="notif-empty">Loading…</div>
              </div>
            </div>
          </div>
          <button class="btn btn-danger btn-icon" onclick="doLogout()" title="Logout">
            <i data-lucide="log-out"></i>
          </button>
        </div>
      </header>

      <div class="section-title">
        <i data-lucide="award"></i> My Published Results
      </div>
      <div id="results-grid" class="results-grid">
        <div class="empty-state">Loading your results…</div>
      </div>
    </div>`;
}

function initStudent() {
    loadStudentResults();
    loadNotifications();
    // Auto-refresh every 10 s
    setInterval(() => {
        if (currentUser && currentUser.role==='student') {
            loadStudentResults();
            loadNotifications();
        }
    }, 10000);
}

async function loadStudentResults() {
    try {
        const r = await fetch(`${API}/results/my/${currentUser.id}`);
        const data = await r.json();
        const grid = document.getElementById('results-grid');
        if (!grid) return;
        if (!data.length) {
            grid.innerHTML = `<div class="empty-state">
                No published results yet.<br>You will be notified when your teacher publishes them.</div>`;
        } else {
            grid.innerHTML = data.map(r => `
            <div class="result-card">
              <h3>${r.subject}</h3>
              <div class="result-marks">${r.marks}%</div>
              <div class="result-meta">
                <span>Grade: <span class="highlight">${r.grade}</span></span>
                <span class="badge badge-green">Published</span>
              </div>
            </div>`).join('');
        }
    } catch(err) { console.error('loadStudentResults:', err); }
}

async function loadNotifications() {
    try {
        const r = await fetch(`${API}/notifications/${currentUser.id}`);
        const data = await r.json();
        renderNotifications(data);
    } catch(err) { console.error('loadNotifications:', err); }
}

function renderNotifications(data) {
    const badge = document.getElementById('notif-badge');
    const list  = document.getElementById('notif-list');
    if (!badge || !list) return;

    const unread = data.filter(n => !n.read).length;
    if (unread>0) { badge.textContent=unread>9?'9+':unread; badge.classList.add('show'); }
    else          { badge.textContent=''; badge.classList.remove('show'); }

    if (!data.length) {
        list.innerHTML = '<div class="notif-empty">No notifications yet.</div>';
        return;
    }

    list.innerHTML = data.map(n => `
    <div class="notif-item ${n.read ? 'read' : 'unread'}" id="ni-${n.id}">
      <div class="notif-body">
        <div class="notif-content">
          <div class="notif-msg">${n.message}</div>
          <div class="notif-time">${new Date(n.createdAt).toLocaleString()}</div>
          <div class="notif-status">${n.read ? '✓ Read' : '● Unread'}</div>
        </div>
        <div class="notif-acts">
          <button class="btn-notif toggle"
                  onclick="toggleRead(${n.id},this)"
                  title="${n.read ? 'Mark as Unread' : 'Mark as Read'}">
            <i data-lucide="${n.read ? 'eye-off' : 'eye'}"></i>
          </button>
          <button class="btn-notif del"
                  onclick="deleteNotification(${n.id})"
                  title="Delete notification">
            <i data-lucide="trash-2"></i>
          </button>
        </div>
      </div>
    </div>`).join('');
    icons();
}

// ── UPDATE: toggle read / unread ─────────────────────────────
async function toggleRead(id) {
    try {
        const r = await fetch(`${API}/notifications/${id}/read`, { method:'PUT' });
        if (!r.ok) throw new Error();
        await loadNotifications(); // re-render with updated state
    } catch(err) { console.error('toggleRead:', err); }
}

// ── DELETE: single notification ───────────────────────────────
async function deleteNotification(id) {
    try {
        const r = await fetch(`${API}/notifications/${id}`, { method:'DELETE' });
        if (!r.ok) throw new Error();
        await loadNotifications();
    } catch(err) { console.error('deleteNotification:', err); }
}

// ── DELETE: clear all notifications ──────────────────────────
async function clearAllNotifications() {
    if (!confirm('Clear all notifications? This cannot be undone.')) return;
    try {
        const r = await fetch(`${API}/notifications/clear/${currentUser.id}`, { method:'DELETE' });
        if (!r.ok) throw new Error();
        await loadNotifications();
    } catch(err) { console.error('clearAll:', err); }
}

// ── Toggle dropdown ───────────────────────────────────────────
function toggleDropdown(e) {
    e.stopPropagation();
    document.getElementById('notif-dropdown').classList.toggle('show');
}
document.addEventListener('click', () => {
    const d = document.getElementById('notif-dropdown');
    if (d) d.classList.remove('show');
});

// ════════════════════════════════════════════════════════════════════════════
//  SHARED HELPERS
// ════════════════════════════════════════════════════════════════════════════
function showAlert(id, msg, isError) {
    const el = document.getElementById(id);
    if (!el) return;
    if (!msg) { el.classList.remove('show','success','error'); return; }
    el.className = `alert show ${isError ? 'error' : 'success'}`;
    el.innerHTML = `<i data-lucide="${isError ? 'alert-circle' : 'check-circle'}"></i> ${msg}`;
    icons();
    if (!isError) setTimeout(() => el.classList.remove('show'), 4000);
}

// ════════════════════════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════════════════════════
window.onload = render;
</script>
