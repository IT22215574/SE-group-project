<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LMS Class Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
<div class="mx-auto max-w-6xl p-6 md:p-10">
    <header class="mb-8 rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
        <h1 class="text-2xl font-bold md:text-3xl">LMS Class Management</h1>
        <p class="mt-2 text-slate-600">Frontend portal for creating classes and assigning subjects.</p>
    </header>

    <section class="grid gap-6 md:grid-cols-2">
        <div class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
            <h2 class="text-lg font-semibold">Subject Form</h2>
            <form id="subject-form" class="mt-4 space-y-3">
                <input id="subject-id" type="hidden" />
                <label class="block text-sm font-medium">Subject Name</label>
                <input id="subject-name" class="w-full rounded-lg border border-slate-300 p-2" placeholder="Mathematics" required />
                <div class="flex gap-2">
                    <button class="rounded-lg bg-emerald-600 px-4 py-2 text-white" type="submit">Save Subject</button>
                    <button id="subject-reset" class="rounded-lg border border-slate-300 px-4 py-2" type="button">Clear</button>
                </div>
            </form>
            <div id="subject-list" class="mt-4 flex flex-wrap gap-2"></div>
        </div>

        <div class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
            <h2 class="text-lg font-semibold">Class Form</h2>
            <form id="class-form" class="mt-4 space-y-3">
                <input id="class-id" type="hidden" />
                <div>
                    <label class="block text-sm font-medium">Class Name</label>
                    <input id="class-name" class="w-full rounded-lg border border-slate-300 p-2" placeholder="Grade 10 - A" required />
                </div>
                <div>
                    <label class="block text-sm font-medium">Grade</label>
                    <input id="class-grade" class="w-full rounded-lg border border-slate-300 p-2" placeholder="10" required />
                </div>
                <div>
                    <label class="block text-sm font-medium">Academic Year</label>
                    <input id="class-year" class="w-full rounded-lg border border-slate-300 p-2" placeholder="2026" required />
                </div>
                <div>
                    <p class="text-sm font-medium">Assign Subjects</p>
                    <div id="subject-checkboxes" class="mt-2 grid grid-cols-1 gap-2 sm:grid-cols-2"></div>
                </div>
                <div class="flex gap-2">
                    <button class="rounded-lg bg-blue-600 px-4 py-2 text-white" type="submit">Save Class</button>
                    <button id="class-reset" class="rounded-lg border border-slate-300 px-4 py-2" type="button">Clear</button>
                </div>
            </form>
        </div>
    </section>

    <section class="mt-6 rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
        <h2 class="text-lg font-semibold">Class List</h2>
        <div class="mt-4 overflow-x-auto">
            <table class="min-w-full text-left text-sm">
                <thead>
                <tr class="border-b border-slate-200">
                    <th class="p-2">Class Name</th>
                    <th class="p-2">Grade</th>
                    <th class="p-2">Year</th>
                    <th class="p-2">Subjects</th>
                    <th class="p-2">Actions</th>
                </tr>
                </thead>
                <tbody id="class-table-body"></tbody>
            </table>
        </div>
    </section>
</div>

<script src="./lms-class-management.js"></script>
</body>
</html>
