<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LMS Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-white text-slate-900">
<main class="mx-auto flex min-h-screen max-w-7xl items-center justify-center px-4 py-10 md:px-8">
    <div class="w-full max-w-xl">
        <section class="rounded-[2rem] border border-slate-200 bg-white p-8 shadow-lg">
            <h1 class="text-3xl font-black tracking-tight text-slate-950 md:text-5xl">Sign in</h1>

            <form id="login-form" class="mt-8 space-y-4">
                <div>
                    <label class="mb-2 block text-sm font-semibold text-slate-700">Email</label>
                    <input id="email" type="email" autocomplete="email" placeholder="you@example.com" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 outline-none transition focus:border-blue-600 focus:ring-4 focus:ring-blue-100" required />
                </div>

                <div>
                    <label class="mb-2 block text-sm font-semibold text-slate-700">Password</label>
                    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 outline-none transition focus:border-blue-600 focus:ring-4 focus:ring-blue-100" required />
                </div>

                <button type="submit" class="w-full rounded-2xl bg-blue-600 px-4 py-3.5 font-semibold text-white transition hover:bg-blue-700">Sign In</button>
            </form>

            <div id="login-message" class="mt-4 hidden rounded-2xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-900"></div>
        </section>
    </div>
</main>

<script src="./auth.js"></script>
<script>
    const loginForm = document.getElementById("login-form");
    const loginMessage = document.getElementById("login-message");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");

    const existingAuth = typeof getAuthState === "function" ? getAuthState() : null;
    if (existingAuth) {
        window.location.href = "./lms-class-management.html";
    }

    loginForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email || !password) {
            loginMessage.textContent = "Enter both email and password.";
            loginMessage.classList.remove("hidden");
            return;
        }

        if (typeof setAuthState === "function") {
            const role = typeof inferRoleFromEmail === "function" ? inferRoleFromEmail(email) : "student";
            setAuthState({ role, email });
        }
        window.location.href = "./lms-class-management.html";
    });
</script>
</body>
</html>
