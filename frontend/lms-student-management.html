<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-100 text-slate-900">
<div class="mx-auto max-w-7xl p-6">

  <nav class="mb-6 flex items-center justify-between rounded-2xl bg-white p-4 shadow">
    <h1 class="text-2xl font-bold text-blue-900">Student Management</h1>
    <a href="./lms-class-management.html#students" class="rounded-lg bg-slate-800 px-4 py-2 text-white">Back</a>
  </nav>

  <section class="grid gap-6 md:grid-cols-2">

    <div id="student-form-card" class="rounded-2xl bg-white p-5 shadow">
      <h2 class="mb-4 text-xl font-bold">Add / Update Student</h2>

      <form id="student-form" class="space-y-3">
        <input id="student-id" type="hidden" />

        <div>
          <label class="block text-sm font-medium">Full Name</label>
          <input id="student-name" class="w-full rounded-lg border p-2" placeholder="John Doe" required />
        </div>

        <div>
          <label class="block text-sm font-medium">Email</label>
          <input id="student-email" type="email" class="w-full rounded-lg border p-2" placeholder="john@example.com" required />
        </div>

        <div>
          <label class="block text-sm font-medium">Phone</label>
          <input id="student-phone" class="w-full rounded-lg border p-2" placeholder="0773040132" required />
        </div>

        <div>
          <label class="block text-sm font-medium">Class</label>
          <select id="student-class" class="w-full rounded-lg border p-2" required>
            <option value="">Select class</option>
          </select>
        </div>

        <div class="flex gap-2">
          <button class="rounded-lg bg-blue-600 px-4 py-2 text-white" type="submit">Save Student</button>
          <button id="student-reset" class="rounded-lg border px-4 py-2" type="button">Clear</button>
        </div>
      </form>
    </div>

    <div class="rounded-2xl bg-white p-5 shadow">
      <div class="mb-4 flex gap-2">
        <input id="student-search" class="w-full rounded-lg border p-2" placeholder="Search student..." />
        <button id="student-search-btn" type="button" class="rounded-lg bg-slate-800 px-4 py-2 text-white">Search</button>
      </div>

      <div class="overflow-x-auto">
        <table class="min-w-full text-left text-sm">
          <thead>
          <tr class="bg-slate-100">
            <th class="p-3">Name</th>
            <th class="p-3">Email</th>
            <th class="p-3">Phone</th>
            <th class="p-3">Class</th>
            <th class="p-3">Actions</th>
          </tr>
          </thead>
          <tbody id="student-table-body"></tbody>
        </table>
      </div>
    </div>

  </section>
</div>

<script src="./auth.js"></script>
<script src="./lms-student-management.js"></script>
</body>
</html>
