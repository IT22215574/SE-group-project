<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
<div class="mx-auto max-w-7xl p-6">
  <nav class="mb-6 flex items-center justify-between rounded-2xl bg-white p-4 shadow">
    <h1 class="text-2xl font-bold text-blue-900">Student Management</h1>
    <a href="./lms-class-management.html" class="rounded-lg bg-slate-800 px-4 py-2 text-white">Back</a>
  </nav>

  <section class="grid gap-6 md:grid-cols-2">
    <div class="rounded-2xl bg-white p-5 shadow">
      <h2 class="mb-4 text-xl font-bold">Add / Update Student</h2>

      <form id="student-form" class="space-y-3">
        <input id="student-id" type="hidden" />

        <input id="admission-no" class="w-full rounded-lg border p-2" placeholder="Admission No" required />
        <input id="first-name" class="w-full rounded-lg border p-2" placeholder="First Name" required />
        <input id="last-name" class="w-full rounded-lg border p-2" placeholder="Last Name" required />

        <select id="gender" class="w-full rounded-lg border p-2" required>
          <option value="">Select Gender</option>
          <option>Male</option>
          <option>Female</option>
        </select>

        <input id="date-of-birth" type="date" class="w-full rounded-lg border p-2" />
        <input id="email" type="email" class="w-full rounded-lg border p-2" placeholder="Student Email" />
        <input id="phone" class="w-full rounded-lg border p-2" placeholder="Student Phone" />

        <input id="grade" class="w-full rounded-lg border p-2" placeholder="Grade" required />

        <select id="class-id" class="w-full rounded-lg border p-2">
          <option value="">Select Class</option>
        </select>

        <input id="guardian-name" class="w-full rounded-lg border p-2" placeholder="Guardian Name" required />
        <input id="guardian-phone" class="w-full rounded-lg border p-2" placeholder="Guardian Phone" required />
        <input id="guardian-email" type="email" class="w-full rounded-lg border p-2" placeholder="Guardian Email" />

        <textarea id="address" class="w-full rounded-lg border p-2" placeholder="Address"></textarea>

        <select id="status" class="w-full rounded-lg border p-2">
          <option value="ACTIVE">Active</option>
          <option value="INACTIVE">Inactive</option>
          <option value="TRANSFERRED">Transferred</option>
          <option value="GRADUATED">Graduated</option>
        </select>

        <textarea id="notes" class="w-full rounded-lg border p-2" placeholder="Notes"></textarea>

        <div class="flex gap-2">
          <button class="rounded-lg bg-blue-600 px-4 py-2 text-white" type="submit">Save Student</button>
          <button id="reset-btn" class="rounded-lg border px-4 py-2" type="button">Clear</button>
        </div>
      </form>
    </div>

    <div class="rounded-2xl bg-white p-5 shadow">
      <div class="mb-4 flex gap-2">
        <input id="search" class="w-full rounded-lg border p-2" placeholder="Search student..." />
        <button id="search-btn" class="rounded-lg bg-slate-800 px-4 py-2 text-white">Search</button>
      </div>

      <div class="overflow-x-auto">
        <table class="min-w-full text-left text-sm">
          <thead>
          <tr class="bg-slate-100">
            <th class="p-3">Admission No</th>
            <th class="p-3">Name</th>
            <th class="p-3">Grade</th>
            <th class="p-3">Class</th>
            <th class="p-3">Status</th>
            <th class="p-3">Actions</th>
          </tr>
          </thead>
          <tbody id="student-table-body"></tbody>
        </table>
      </div>
    </div>
  </section>
</div>

<script src="./auth.js"></script>
<script src="./lms-student-management.js"></script>
</body>
</html>
